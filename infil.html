<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infiltration Report Parser - Imperial Conflict</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
        h1 { color: #58a6ff; margin-bottom: 5px; }
        p { color: #8b949e; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input[type="text"], textarea { width: 100%; background: #010409; color: #58a6ff; border: 1px solid #30363d; padding: 10px; margin-bottom: 10px; border-radius: 6px; font-family: monospace; box-sizing: border-box; }
        textarea { height: 200px; }
        
        .btn-container { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        button { background: #238636; color: white; border: 1px solid rgba(240,246,252,0.1); padding: 8px 16px; cursor: pointer; font-weight: bold; border-radius: 6px; transition: 0.2s; }
        button:hover { background: #2ea043; }
        .copy-btn { background: #1f6feb; }
        .copy-btn:hover { background: #388bfd; }
        .clear-btn { background: #da3633; }
        .clear-btn:hover { background: #f85149; }
        
        .save-status { color: #8b949e; font-size: 0.85em; font-style: italic; }
        .memory-status { color: #3fb950; font-size: 0.9em; font-weight: bold; margin-bottom: 10px; display: block; }
        
        /* Profiles UI */
        .profiles-container { margin-bottom: 15px; padding: 10px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .profile-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 5px 12px; font-size: 0.9em; }
        .profile-btn:hover { background: #30363d; border-color: #8b949e; }
        .profile-label { font-weight: bold; color: #8b949e; margin-right: 10px; }
        
        /* Output Box Styling */
        .output-container { background: #161b22; padding: 20px; border: 1px solid #30363d; border-radius: 6px; font-family: 'Courier New', Courier, monospace; line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-wrap: break-word; }
        hr { border: none; border-top: 1px dashed #444; margin: 12px 0; }
        
        .section-header { font-weight: 900; font-size: 1.5em; color: #ffffff; letter-spacing: 1px; margin-top: 25px; margin-bottom: 15px; border-bottom: 2px solid #30363d; padding-bottom: 5px; }
        
        .res-Cash { color: #e3b341; font-weight: bold; }
        .res-Food { color: #d4a373; font-weight: bold; }
        .res-Iron { color: #a0aaba; font-weight: bold; }
        .res-Octarine { color: #b854d4; font-weight: bold; }
        .res-Endurium { color: #00bcd4; font-weight: bold; }
        
        .emp-name { color: #ff7b72; font-weight: bold; }
        .success-text { color: #3fb950; font-weight: bold; }
        .fail-text { color: #f85149; font-weight: bold; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #58a6ff; text-decoration: none; font-size: 0.9em; }
        .back-link:hover { text-decoration: underline; }
        .planet-link { color: #d2a8ff; text-decoration: none; font-weight: bold; border-bottom: 1px dashed #d2a8ff; }
        .planet-link:hover { color: #e2c5ff; border-bottom: 1px solid #e2c5ff; }
    </style>
</head>
<body>

<a href="index.html" class="back-link">← Back to Tools Index</a>

<div>
    <h1>Infiltration Report Parser</h1>
    <p>Track multiple empires. Type a name to create a profile, or click a saved profile below to add to their logs without doubling up.</p>
</div>

<div class="input-group">
    <input type="text" id="usernameInput" placeholder="Your Empire Name" oninput="saveSettings()">
    <input type="text" id="familyIdInput" placeholder="Target Family ID" oninput="saveSettings()">
    <input type="text" id="galaxyIdInput" placeholder="Galaxy ID (e.g., 269)" oninput="saveSettings()">
</div>

<div class="input-group" style="margin-bottom: 5px;">
    <input type="text" id="targetEmpireInput" placeholder="Enter the Target's Empire Name (Who did you infiltrate?)" oninput="updateMemoryStatus()" style="border-color: #d2a8ff;">
</div>

<div id="profilesContainer" class="profiles-container">
    <span class="profile-label">Tracked Empires:</span>
    </div>

<span id="memoryStatus" class="memory-status">Currently holding 0 log events for this target.</span>
<textarea id="logInput" placeholder="Paste your raw infiltrated game logs here..."></textarea>

<div class="btn-container">
    <button onclick="processLogs()">Process Logs</button>
    <button class="copy-btn" onclick="copyToClipboard()">Copy Report to Clipboard</button>
    <button class="clear-btn" onclick="clearTargetMemory()">Clear Target's Logs</button>
    <span id="saveStatus" class="save-status"></span>
</div>

<div id="output" class="output-container">Result will appear here...</div>

<script>
// --- SETTINGS STORAGE ---
function saveSettings() {
    const settings = {
        username: document.getElementById('usernameInput').value,
        familyId: document.getElementById('familyIdInput').value,
        galaxyId: document.getElementById('galaxyIdInput').value
    };
    localStorage.setItem('ic_infil_settings', JSON.stringify(settings));
}

function loadSettings() {
    const saved = localStorage.getItem('ic_infil_settings');
    if (saved) {
        const settings = JSON.parse(saved);
        document.getElementById('usernameInput').value = settings.username || "";
        document.getElementById('familyIdInput').value = settings.familyId || "";
        document.getElementById('galaxyIdInput').value = settings.galaxyId || "";
    }
}

// --- MULTI-USER MEMORY LOGIC ---
function getStoredInfils() {
    const saved = localStorage.getItem('ic_infil_memory_v2');
    return saved ? JSON.parse(saved) : {};
}

function saveStoredInfils(data) {
    localStorage.setItem('ic_infil_memory_v2', JSON.stringify(data));
    renderProfiles();
}

function renderProfiles() {
    const data = getStoredInfils();
    const container = document.getElementById('profilesContainer');
    let html = `<span class="profile-label">Tracked Empires:</span>`;
    
    const targets = Object.keys(data).sort();
    if (targets.length === 0) {
        html += `<span style="color: #8b949e; font-style: italic;">No profiles saved yet. Process a log to create one.</span>`;
    } else {
        targets.forEach(target => {
            let logCount = data[target].length;
            html += `<button class="profile-btn" onclick="selectProfile('${target}')">${target} (${logCount})</button>`;
        });
    }
    container.innerHTML = html;
    updateMemoryStatus();
}

function selectProfile(name) {
    document.getElementById('targetEmpireInput').value = name;
    document.getElementById('logInput').value = ""; // Clear input box when switching
    updateMemoryStatus();
    
    // Automatically generate the report for this selected profile
    processLogs(true); 
}

function updateMemoryStatus() {
    const target = document.getElementById('targetEmpireInput').value.trim();
    if (!target) {
        document.getElementById('memoryStatus').innerText = "Enter a target name above to track logs.";
        document.getElementById('memoryStatus').style.color = "#8b949e";
        return;
    }
    
    const data = getStoredInfils();
    const count = data[target] ? data[target].length : 0;
    document.getElementById('memoryStatus').innerText = `Currently holding ${count} unique log blocks for ${target}.`;
    document.getElementById('memoryStatus').style.color = "#3fb950";
}

function clearTargetMemory() {
    const target = document.getElementById('targetEmpireInput').value.trim();
    if (!target) {
        alert("Please enter or select a target name first.");
        return;
    }
    
    if(confirm(`Are you sure you want to clear all saved logs for ${target}?`)) {
        let data = getStoredInfils();
        delete data[target];
        saveStoredInfils(data);
        
        document.getElementById('logInput').value = "";
        document.getElementById('output').innerHTML = "Result will appear here...";
        
        const status = document.getElementById('saveStatus');
        status.innerText = `${target}'s memory cleared.`;
        setTimeout(() => { status.innerText = ""; }, 2000);
    }
}

// Initialize on page load
window.onload = () => {
    loadSettings();
    renderProfiles();
};

// --- HELPER FUNCTIONS ---
function createPlanetLink(planetNum, x, y, galaxyId) {
    const label = `Planet ${planetNum} (${x}:${y})`;
    if (!galaxyId) return `<b>${label}</b>`;
    // Changed URL format specifically for Planets View
    const url = `https://imperialconflict.com/planets/view.php?galaxy=${galaxyId}&planet=${x},${y}:${planetNum}`;
    return `<a href="${url}" target="_blank" class="planet-link">${label}</a>`;
}

function normalizeName(name) {
    name = name.trim();
    const mapping = {
        "Exploration Ship": "Exploration Ships",
        "Laser": "Lasers",
        "Mining facility": "Mining Facilities",
        "Refinement station": "Refinement Stations",
        "Research center": "Research Centers",
        "Hydroponic farm": "Hydroponic Farms",
        "Occult center": "Occult Centers",
        "Cash factory": "Cash factorys"
    };
    if (mapping[name]) return mapping[name];
    if (!name.endsWith("s")) return name + "s";
    return name;
}

// --- MAIN PROCESSING ---
// The isLoadOnly flag allows us to generate the report without showing "Settings saved" if we just clicked a profile
function processLogs(isLoadOnly = false) {
    const target = document.getElementById('targetEmpireInput').value.trim();
    if (!target) {
        alert("You must enter a Target Empire Name to save and process logs.");
        return;
    }

    const rawData = document.getElementById('logInput').value;
    const galaxyId = document.getElementById('galaxyIdInput').value.trim();
    
    // Split new logs into blocks
    const newBlocks = rawData.split(/(?=T-\d+:)/).map(b => b.trim()).filter(b => b);

    // Fetch memory and deduplicate
    let memoryData = getStoredInfils();
    let targetLogs = memoryData[target] || [];
    
    const allUniqueBlocksSet = new Set([...targetLogs, ...newBlocks]);
    const finalBlocksToProcess = Array.from(allUniqueBlocksSet);
    
    // Save merged logs back to memory
    memoryData[target] = finalBlocksToProcess;
    saveStoredInfils(memoryData); // This also updates UI/Memory count

    if (!isLoadOnly) {
        const status = document.getElementById('saveStatus');
        status.innerText = "Logs processed & saved...";
        setTimeout(() => { status.innerText = ""; }, 1500);
    }

    // --- PARSING THE MERGED DATA ---
    let units = {};
    let buildings = {};
    let aidReceived = {};
    let fleets = {};
    let exploredCount = 0;
    let portals = [];
    let defenseSuccess = [];
    let defenseFail = {};

    finalBlocksToProcess.forEach(block => {
        if (block.includes("Construction completed")) {
            let match = block.match(/We have built ([\d,]+) (.*?)\./);
            if (match) {
                let qty = parseInt(match[1].replace(/,/g, ''));
                let name = normalizeName(match[2]);
                units[name] = (units[name] || 0) + qty;
            }
        }
        else if (block.includes("Buildings complete")) {
            let match = block.match(/We have built ([\d,]+) (.*?) on/);
            if (match) {
                let qty = parseInt(match[1].replace(/,/g, ''));
                let name = normalizeName(match[2]);
                buildings[name] = (buildings[name] || 0) + qty;
            }
        }
        else if (block.includes("Aid shipment")) {
            let match = block.match(/We have received an aid shipment of (.*?) from (\w+)\./);
            if (match) {
                let sender = match[2];
                let resources = match[1];
                if (!aidReceived[sender]) aidReceived[sender] = { Cash: 0, Food: 0, Iron: 0, Octarine: 0, Endurium: 0 };
                let resParts = resources.matchAll(/([\d,]+)\s+(Cash|Food|Iron|Endurium|Octarine)/ig);
                for (const part of resParts) {
                    let type = part[2].charAt(0).toUpperCase() + part[2].slice(1).toLowerCase(); 
                    aidReceived[sender][type] += parseInt(part[1].replace(/,/g, ''));
                }
            }
        }
        else if (block.includes("Destination reached")) {
            let match = block.match(/attack on planet (\d+) in the (\d+):(\d+) system/);
            if (match) {
                let link = createPlanetLink(match[1], match[2], match[3], galaxyId);
                fleets[link] = (fleets[link] || 0) + 1;
            }
        }
        else if (block.includes("Explored a planet")) exploredCount++;
        else if (block.includes("Portal completed")) {
            let match = block.match(/planet (\d+) in the (\d+),(\d+) system/);
            if (match) portals.push(createPlanetLink(match[1], match[2], match[3], galaxyId));
        }
        else if (block.includes("Defense Report")) {
            if (block.includes("fight the attackers off")) {
                let match = block.match(/planet (\d+) at x:(\d+), y:(\d+) was attacked by (\w+) of family (\d+).*?In the fight (.*)/is);
                if (match) {
                    let link = createPlanetLink(match[1], match[2], match[3], galaxyId);
                    defenseSuccess.push(`${link} defended against ${match[4]} (Family ${match[5]}). ${match[6].trim()}`);
                }
            } 
            else if (block.includes("flee the planet")) {
                let match = block.match(/planet (\d+) at x:(\d+), y:(\d+) was attacked by (\w+) of family (\d+).*?flee the planet\.(.*)/is);
                if (match) {
                    let attacker = `${match[4]} (Family ${match[5]})`;
                    let link = createPlanetLink(match[1], match[2], match[3], galaxyId);
                    let result = match[6].trim();
                    if (!defenseFail[attacker]) defenseFail[attacker] = [];
                    defenseFail[attacker].push({ link: link, result: result });
                }
            }
        }
    });

    let html = `<div style="font-weight: bold; margin-bottom: 10px; color: #d2a8ff; font-size: 1.2em;">Infiltration Summary: ${target}</div>`;
    
    html += `<div class="section-header">Units Constructed</div>`;
    if (Object.keys(units).length > 0) {
        Object.keys(units).sort((a,b) => units[b] - units[a]).forEach(u => {
            html += `<div>* <b>${u}:</b> ${units[u].toLocaleString()}</div>`;
        });
    } else { html += `<div>No units constructed.</div>`; }

    html += `<div class="section-header">Aid Received</div>`;
    const resourceOrder = ["Cash", "Food", "Iron", "Octarine", "Endurium"];
    let aidFound = false;
    Object.keys(aidReceived).sort().forEach(sender => {
        let r = aidReceived[sender];
        let parts = [];
        resourceOrder.forEach(k => { if (r[k] > 0) parts.push(`<div>* <span class="res-${k}">${r[k].toLocaleString()} ${k}</span></div>`); });
        if (parts.length > 0) {
            aidFound = true;
            html += `<div style="margin-top: 15px;"><b>From <span class="emp-name">${sender}</span>:</b></div>` + parts.join('');
        }
    });
    if (!aidFound) html += `<div>No aid received.</div>`;

    html += `<div class="section-header">Defense Reports</div><div class="success-text">Successful Defenses (${defenseSuccess.length}):</div>`;
    if (defenseSuccess.length > 0) {
        defenseSuccess.forEach(d => html += `<div>* ${d}</div>`);
    } else { html += `<div>None.</div>`; }

    let failCount = Object.values(defenseFail).reduce((acc, arr) => acc + arr.length, 0);
    html += `<div class="fail-text" style="margin-top: 15px;">Failed Defenses (${failCount}):</div>`;
    if (failCount > 0) {
        Object.keys(defenseFail).forEach(attacker => {
            let incidents = defenseFail[attacker];
            html += `<div style="margin-top: 10px;">* <b>vs. <span class="emp-name">${attacker}</span>:</b> ${incidents.length} planet(s) lost.</div>`;
            incidents.forEach(i => { html += `<div style="margin-left: 20px;">- ${i.link}: ${i.result}</div>`; });
        });
    } else { html += `<div>None.</div>`; }

    html += `<div class="section-header">Fleet Movements</div>`;
    if (Object.keys(fleets).length > 0) {
        Object.keys(fleets).forEach(f => { html += `<div>* ${f}: Targeted ${fleets[f]} time(s)</div>`; });
    } else { html += `<div>No fleets arrived.</div>`; }

    html += `<div class="section-header">Planetary Development</div><div><b>Exploration:</b> ${exploredCount} planet(s).</div><div><b>Portals:</b> ${portals.length > 0 ? portals.join(", ") : "None"}.</div>`;
    html += `<div style="margin-top: 10px;"><b>Buildings:</b></div>`;
    if (Object.keys(buildings).length > 0) {
        Object.keys(buildings).forEach(b => { html += `<div>* <b>${b}:</b> ${buildings[b].toLocaleString()}</div>`; });
    } else { html += `<div>No buildings constructed.</div>`; }
    
    document.getElementById('output').innerHTML = html;
}

function copyToClipboard() {
    const outputContainer = document.getElementById('output');
    if (outputContainer.innerText.includes("Result will appear here")) {
        alert("Please process logs before copying!");
        return;
    }
    navigator.clipboard.writeText(outputContainer.innerText).then(() => { alert("Report copied!"); });
}
</script>
</body>
</html>
