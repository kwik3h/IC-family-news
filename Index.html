<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Conflict Log Parser</title>
    <style>
        body { font-family: monospace; background: #121212; color: #e0e0e0; padding: 20px; }
        textarea { width: 100%; height: 200px; background: #1e1e1e; color: #00ff00; border: 1px solid #333; padding: 10px; margin-bottom: 10px; }
        .btn-container { display: flex; gap: 10px; margin-bottom: 20px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        button:hover { background: #0056b3; }
        .copy-btn { background: #28a745; }
        .copy-btn:hover { background: #218838; }
        pre { background: #000; padding: 15px; border: 1px solid #444; white-space: pre-wrap; word-wrap: break-word; }
        .header { border-bottom: 2px solid #444; margin-bottom: 20px; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Imperial Conflict Log Parser</h1>
    <p>Paste your raw logs here and click Process Logs.</p>
</div>

<textarea id="logInput" placeholder="Paste your raw game logs here..."></textarea>
<br>
<div class="btn-container">
    <button onclick="processLogs()">Process Logs</button>
    <button class="copy-btn" onclick="copyToClipboard()">Copy Report</button>
</div>

<h2>Result</h2>
<pre id="output">Result will appear here...</pre>

<script>
function processLogs() {
    const rawData = document.getElementById('logInput').value;
    const lines = rawData.split('\n').map(l => l.trim().replace(/^[A-Z]+\s+/, '')).filter(l => l);
    
    let explored = 0;
    let familyCaptures = [];
    let myCaptures = [];
    let familyDefeats = [];
    let myDefeats = [];
    let missingPlanets = new Set();
    let evolutions = [];
    let aidReceived = {};

    lines.forEach(line => {
        // Explored
        if (line.includes("explored planet")) explored++;

        // Captures
        let capMatch = line.match(/T-(\d+)\s+The forces of (\w+) took (planet \d+ in the [\d, ]+ system) from (.*?) \(13694\)/);
        if (capMatch) {
            let entry = `T-${capMatch[1]} ${capMatch[2]} took ${capMatch[3]} from ${capMatch[4]}.`;
            if (capMatch[2].toLowerCase() === "jealous") myCaptures.push(entry);
            else familyCaptures.push(entry);
        }

        // Defeats
        let defMatch = line.match(/T-(\d+)\s+After a brave fight our family member (\w+) had to flee the (?:planet\s+)?(planet \d+ in the [\d, ]+ system) which was attacked by (.*?) of family 13694/);
        if (defMatch) {
            let entry = `T-${defMatch[1]} ${defMatch[2]} fled ${defMatch[3]} (${defMatch[4]}).`;
            if (defMatch[2].toLowerCase() === "jealous") myDefeats.push(entry);
            else familyDefeats.push(entry);
            missingPlanets.add(defMatch[3]);
        }

        // Evolutions
        let evoMatch = line.match(/T-(\d+)\s+(\w+) evolved to an empire of (.*?)\./);
        if (evoMatch) evolutions.push(`T-${evoMatch[1]} ${evoMatch[2]} evolved to ${evoMatch[3]}.`);

        // Aid
        let aidMatch = line.match(/T-(\d+)\s+(?:In the name of cooperation\s+)?(\w+) has sent a shipment of (.*?) to (\w+)/);
        if (aidMatch) {
            let receiver = aidMatch[4];
            let resources = aidMatch[3];
            if (!aidReceived[receiver]) aidReceived[receiver] = { Cash: 0, Food: 0, Iron: 0, Endurium: 0, Octarine: 0 };
            
            let resParts = resources.matchAll(/([\d,]+)\s+(Cash|Food|Iron|Endurium|Octarine)/g);
            for (const part of resParts) {
                aidReceived[receiver][part[2]] += parseInt(part[1].replace(/,/g, ''));
            }
        }
    });

    // Formatting Output
    let res = `Result\n--------------------\n    Explored   \n-------------------\n${explored} planet(s) Explored.\n\n`;
    
    res += `--------------------\n    Family Captures   \n-------------------\n${familyCaptures.length} planet(s) Family Captures.\n` + familyCaptures.join('\n') + "\n\n";
    res += `--------------------\n    Captures   \n-------------------\n${myCaptures.length} planet(s) Captures.\n` + myCaptures.join('\n') + "\n\n";
    res += `--------------------\n    Family Defeats   \n-------------------\n${familyDefeats.length} planet(s) Family Defeats.\n` + familyDefeats.join('\n') + "\n\n";
    res += `--------------------\n    Defeats   \n-------------------\n${myDefeats.length} planet(s) Defeats.\n` + myDefeats.join('\n') + "\n\n";
    res += `--------------------\n    Empire Evolutions   \n-------------------\n${evolutions.length} evolution(s).\n` + evolutions.join('\n') + "\n\n";
    
    res += `--------------------\n- List of destroyed planets:\n--------------------\n    Planets still missing   \n-------------------\n${missingPlanets.size} planet(s) missing.\n`;
    missingPlanets.forEach(p => res += `* ${p}\n`);

    res += `\n--------------------\nOPEN RETAKES\n--------------------\n`;
    missingPlanets.forEach(p => res += `${p}\n`);

    res += `\n--------------------\nOPEN RETAKES Clean List\n--------------------\n${missingPlanets.size} planet(s) missing in action\n`;

    res += `\n--------------------\n- Aid Received (Total to Each Member) -\n--------------------\n`;
    Object.keys(aidReceived).sort().forEach(name => {
        let r = aidReceived[name];
        let parts = [];
        for (let k in r) if (r[k] > 0) parts.push(`${r[k].toLocaleString()} ${k}`);
        res += `To ${name}: ${parts.join(', ')}\n`;
    });

    document.getElementById('output').innerText = res;
}

function copyToClipboard() {
    const outputText = document.getElementById('output').innerText;
    if (outputText === "Result will appear here...") {
        alert("Please process logs before copying!");
        return;
    }
    navigator.clipboard.writeText(outputText).then(() => {
        alert("Report copied to clipboard!");
    }).catch(err => {
        alert("Failed to copy: " + err);
    });
}
</script>

</body>
</html>
